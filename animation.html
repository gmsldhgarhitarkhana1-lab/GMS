<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame Offline Test</title>
    <!-- Include local A-Frame library -->
    <script src=" https://aframe.io/releases/1.7.1/aframe.min.js "></script>
  </head>
  <body>
    <a-scene>
      <!-- Animation using <a-animation> component -->
        <!-- <a-box position="0 1 -3" color="blue">
          <a-animation attribute="position" to="4 1 -3" dur="5000" repeat="2"></a-animation>
        </a-box>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4">
            <a-animation attribute="rotation" to="-90 360 0" dur="10000" repeat="indefinite"></a-animation>
        </a-plane> -->

    <!-- animation component -->
       <a-box position="0 1 -3" color="blue" animation="property: position; to: 4 1 -3; dur: 5000; loop:true; dir: alternate">
        </a-box>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4" animation="property: rotation; to: -90 360 0; dur: 10000; loop:true">
            
        </a-plane>

        <a-sphere position="2 1 -3" radius="0.5" color="red" animation="property: scale; to: 2 1 1; dur: 2000; loop:true; dir: alternate"></a-sphere>

    </a-scene>
  </body>
</html>
